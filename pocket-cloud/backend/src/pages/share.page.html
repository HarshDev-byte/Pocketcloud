<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared File - Pocket Cloud Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 32px 24px;
        }

        .file-info {
            text-align: center;
            margin-bottom: 32px;
        }

        .file-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #f3f4f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .file-name {
            font-size: 20px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .file-details {
            color: #6b7280;
            font-size: 14px;
        }

        .password-form {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .expiry-info {
            background: #fef3c7;
            border: 1px solid #fde68a;
            color: #d97706;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        .folder-contents {
            margin-top: 24px;
        }

        .folder-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .folder-item:last-child {
            border-bottom: none;
        }

        .folder-item-icon {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            background: #f3f4f6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .folder-item-info {
            flex: 1;
        }

        .folder-item-name {
            font-weight: 500;
            color: #111827;
            margin-bottom: 2px;
        }

        .folder-item-size {
            font-size: 12px;
            color: #6b7280;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 640px) {
            .container {
                margin: 10px;
                border-radius: 12px;
            }
            
            .content {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Pocket Cloud Drive</h1>
            <p>Shared with you</p>
        </div>

        <div class="content">
            <div id="loading" class="text-center">
                <p>Loading...</p>
            </div>

            <div id="error-container" class="hidden">
                <div class="error-message" id="error-message"></div>
            </div>

            <div id="main-content" class="hidden">
                <div class="file-info">
                    <div class="file-icon" id="file-icon">📄</div>
                    <div class="file-name" id="file-name"></div>
                    <div class="file-details" id="file-details"></div>
                </div>

                <div id="expiry-warning" class="expiry-info hidden">
                    <span id="expiry-text"></span>
                </div>

                <div id="password-section" class="password-form hidden">
                    <form id="password-form">
                        <div class="form-group">
                            <label class="form-label" for="password">Password Required</label>
                            <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Unlock</button>
                    </form>
                </div>

                <div id="download-section" class="hidden">
                    <button id="download-btn" class="btn btn-primary">
                        <span id="download-text">Download</span>
                    </button>
                </div>

                <div id="folder-contents" class="folder-contents hidden">
                    <h3 style="margin-bottom: 16px; color: #374151;">Folder Contents</h3>
                    <div id="folder-items"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Share data injected by server
        const shareData = {{SHARE_DATA}};
        let accessToken = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
        });

        function initializePage() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            // Set file info
            document.getElementById('file-name').textContent = shareData.name;
            
            // Set file icon
            const icon = getFileIcon(shareData.type, shareData.isFolder);
            document.getElementById('file-icon').textContent = icon;

            // Set file details
            let details = shareData.isFolder ? 'Folder' : formatFileSize(shareData.size);
            if (shareData.downloadCount !== undefined) {
                details += ` • ${shareData.downloadCount} downloads`;
            }
            document.getElementById('file-details').textContent = details;

            // Show expiry warning if applicable
            if (shareData.expiresAt) {
                showExpiryWarning(shareData.expiresAt);
            }

            // Handle password protection
            if (shareData.requiresPassword) {
                document.getElementById('password-section').classList.remove('hidden');
                document.getElementById('password-form').addEventListener('submit', handlePasswordSubmit);
            } else {
                showDownloadSection();
            }
        }

        function getFileIcon(type, isFolder) {
            if (isFolder) return '📁';
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎥';
            if (type.startsWith('audio/')) return '🎵';
            if (type === 'application/pdf') return '📄';
            if (type.startsWith('text/')) return '📝';
            return '📄';
        }

        function formatFileSize(bytes) {
            if (!bytes) return '';
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showExpiryWarning(expiresAt) {
            const now = Date.now();
            const timeLeft = expiresAt - now;
            
            if (timeLeft > 0) {
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                
                let expiryText;
                if (hours > 24) {
                    const days = Math.floor(hours / 24);
                    expiryText = `Expires in ${days} day${days !== 1 ? 's' : ''}`;
                } else if (hours > 0) {
                    expiryText = `Expires in ${hours}h ${minutes}m`;
                } else {
                    expiryText = `Expires in ${minutes} minute${minutes !== 1 ? 's' : ''}`;
                }
                
                document.getElementById('expiry-text').textContent = expiryText;
                document.getElementById('expiry-warning').classList.remove('hidden');
            }
        }

        function handlePasswordSubmit(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Checking...';

            fetch(`/s/${shareData.token}/auth`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    accessToken = data.accessToken;
                    document.getElementById('password-section').classList.add('hidden');
                    showDownloadSection();
                } else {
                    showError(data.error || 'Invalid password');
                }
            })
            .catch(error => {
                showError('Authentication failed');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Unlock';
            });
        }

        function showDownloadSection() {
            if (shareData.isFolder) {
                loadFolderContents();
            } else {
                document.getElementById('download-section').classList.remove('hidden');
                document.getElementById('download-btn').addEventListener('click', handleDownload);
            }
        }

        function handleDownload() {
            const downloadBtn = document.getElementById('download-btn');
            downloadBtn.disabled = true;
            document.getElementById('download-text').textContent = 'Downloading...';

            let downloadUrl = `/s/${shareData.token}/download`;
            if (accessToken) {
                downloadUrl += `?access_token=${encodeURIComponent(accessToken)}`;
            }

            // Create hidden link and trigger download
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = shareData.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Reset button after delay
            setTimeout(() => {
                downloadBtn.disabled = false;
                document.getElementById('download-text').textContent = 'Download';
            }, 2000);
        }

        function loadFolderContents() {
            let contentsUrl = `/s/${shareData.token}/contents`;
            if (accessToken) {
                contentsUrl += `?access_token=${encodeURIComponent(accessToken)}`;
            }

            fetch(contentsUrl)
            .then(response => response.json())
            .then(data => {
                if (data.items) {
                    displayFolderContents(data.items);
                } else {
                    showError('Failed to load folder contents');
                }
            })
            .catch(error => {
                showError('Failed to load folder contents');
            });
        }

        function displayFolderContents(items) {
            const container = document.getElementById('folder-items');
            container.innerHTML = '';

            items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'folder-item';
                
                const isFolder = !item.mime_type;
                const icon = getFileIcon(item.mime_type || 'folder', isFolder);
                const size = isFolder ? 'Folder' : formatFileSize(item.size);

                itemDiv.innerHTML = `
                    <div class="folder-item-icon">${icon}</div>
                    <div class="folder-item-info">
                        <div class="folder-item-name">${escapeHtml(item.name)}</div>
                        <div class="folder-item-size">${size}</div>
                    </div>
                `;

                container.appendChild(itemDiv);
            });

            document.getElementById('folder-contents').classList.remove('hidden');
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-container').classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
