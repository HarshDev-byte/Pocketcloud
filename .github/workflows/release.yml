name: Release PocketCloud Drive

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: Build Pi OS Image
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qemu-user-static \
          binfmt-support \
          parted \
          kpartx \
          xz-utils \
          wget \
          rsync
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Build Pi OS image
      run: |
        export POCKETCLOUD_VERSION=${{ steps.version.outputs.version }}
        sudo ./scripts/build-image.sh
      env:
        DEBIAN_FRONTEND: noninteractive
    
    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: pocketcloud-image
        path: |
          build/image/PocketCloud-*.img.xz
          build/image/PocketCloud-*.img.xz.sha256
        retention-days: 30

  build-clients:
    name: Build Desktop Clients
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
            ext: .dmg
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: .dmg
          - os: windows-latest
            platform: win32
            arch: x64
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: .tar.gz
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          pocketcloud-mac/package-lock.json
          pocketcloud-win/package-lock.json
    
    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Build macOS client
      if: matrix.platform == 'darwin'
      run: |
        cd pocketcloud-mac
        npm ci
        npm run build
        npm run package:${{ matrix.arch }}
        
        # Rename output file
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          mv dist/PocketCloud-*.dmg ../PocketCloud-${{ steps.version.outputs.version }}-mac-arm64.dmg
        else
          mv dist/PocketCloud-*.dmg ../PocketCloud-${{ steps.version.outputs.version }}-mac-x64.dmg
        fi
    
    - name: Build Windows client
      if: matrix.platform == 'win32'
      run: |
        cd pocketcloud-win
        npm ci
        npm run build
        npm run package:win
        
        # Rename output file
        mv dist/PocketCloud*.exe ../PocketCloud-${{ steps.version.outputs.version }}-win-x64.exe
    
    - name: Build Linux client
      if: matrix.platform == 'linux'
      run: |
        cd pocketcloud-gtk
        
        # Create portable bundle
        mkdir -p PocketCloud-linux-x64
        cp -r * PocketCloud-linux-x64/
        
        # Create launcher script
        cat > PocketCloud-linux-x64/pocketcloud << 'EOF'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        cd "$SCRIPT_DIR"
        python3 pocketcloud-tray.py "$@"
        EOF
        chmod +x PocketCloud-linux-x64/pocketcloud
        
        # Create tarball
        tar -czf PocketCloud-${{ steps.version.outputs.version }}-linux-x64.tar.gz PocketCloud-linux-x64
    
    - name: Upload client artifact
      uses: actions/upload-artifact@v4
      with:
        name: client-${{ matrix.platform }}-${{ matrix.arch }}
        path: PocketCloud-${{ steps.version.outputs.version }}-*
        retention-days: 30

  build-cli:
    name: Build CLI Tools
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: pcd-cli/package-lock.json
    
    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Build CLI
      run: |
        cd pcd-cli
        npm ci
        npm run build
        
        # Package for distribution
        if [ "${{ matrix.platform }}" = "win32" ]; then
          npx pkg . --targets node18-win-x64 --output ../pcd-${{ steps.version.outputs.version }}-win-x64.exe
        elif [ "${{ matrix.platform }}" = "darwin" ]; then
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx pkg . --targets node18-macos-arm64 --output ../pcd-${{ steps.version.outputs.version }}-mac-arm64
          else
            npx pkg . --targets node18-macos-x64 --output ../pcd-${{ steps.version.outputs.version }}-mac-x64
          fi
        else
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx pkg . --targets node18-linux-arm64 --output ../pcd-${{ steps.version.outputs.version }}-linux-arm64
          else
            npx pkg . --targets node18-linux-x64 --output ../pcd-${{ steps.version.outputs.version }}-linux-x64
          fi
        fi
      shell: bash
    
    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: cli-${{ matrix.platform }}-${{ matrix.arch }}
        path: pcd-${{ steps.version.outputs.version }}-*
        retention-days: 30
  build-sdk:
    name: Build and Publish SDK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sdk/package-lock.json
        registry-url: 'https://registry.npmjs.org'
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Update SDK version
      run: |
        cd sdk
        npm version ${{ steps.version.outputs.version_number }} --no-git-tag-version
    
    - name: Build SDK
      run: |
        cd sdk
        npm ci
        npm run build
    
    - name: Publish to npm
      run: |
        cd sdk
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    - name: Upload SDK artifact
      uses: actions/upload-artifact@v4
      with:
        name: sdk
        path: |
          sdk/dist/
          sdk/package.json
          sdk/README.md
        retention-days: 30

  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [build-image, build-clients, build-cli, build-sdk]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install MkDocs
      run: |
        pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Update documentation
      run: |
        # Update version in docs
        sed -i "s/version: .*/version: ${{ steps.version.outputs.version_number }}/" docs/mkdocs.yml
        
        # Build documentation
        cd docs
        mkdocs build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/site

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-image, build-clients, build-cli, build-sdk, update-docs]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        
        # Copy Pi image
        cp artifacts/pocketcloud-image/PocketCloud-*.img.xz release-assets/
        cp artifacts/pocketcloud-image/PocketCloud-*.img.xz.sha256 release-assets/
        
        # Copy desktop clients
        find artifacts/client-* -name "PocketCloud-*" -exec cp {} release-assets/ \;
        
        # Copy CLI tools
        find artifacts/cli-* -name "pcd-*" -exec cp {} release-assets/ \;
        
        # Create checksums for all files
        cd release-assets
        sha256sum * > SHA256SUMS.txt
    
    - name: Generate release notes
      id: release_notes
      run: |
        # Extract changelog for this version
        if [ -f CHANGELOG.md ]; then
          awk '/^## \[${{ steps.version.outputs.version_number }}\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md
        else
          echo "Release ${{ steps.version.outputs.version }}" > release_notes.md
          echo "" >> release_notes.md
          echo "See the full changelog at: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md" >> release_notes.md
        fi
        
        # Add download instructions
        cat >> release_notes.md << 'EOF'
        
        ## 📦 Downloads
        
        ### Pi OS Image (Recommended)
        - **PocketCloud-${{ steps.version.outputs.version }}.img.xz** - Complete Pi OS image, flash to 32GB+ microSD
        - Use [Balena Etcher](https://www.balena.io/etcher/) to flash the image
        - Minimum: Class 10/A1 microSD card, A2 recommended
        
        ### Desktop Clients
        - **macOS**: PocketCloud-${{ steps.version.outputs.version }}-mac-arm64.dmg (Apple Silicon) or mac-x64.dmg (Intel)
        - **Windows**: PocketCloud-${{ steps.version.outputs.version }}-win-x64.exe
        - **Linux**: PocketCloud-${{ steps.version.outputs.version }}-linux-x64.tar.gz
        
        ### CLI Tools
        - Available for Linux (x64/ARM64), macOS (x64/ARM64), and Windows (x64)
        - Install with: `curl -fsSL https://pocketcloud.sh/install-cli.sh | bash`
        
        ### SDK
        - **npm**: `npm install pocketcloud-sdk@${{ steps.version.outputs.version_number }}`
        - **Documentation**: https://pocketcloud.github.io/pocketcloud/sdk/
        
        ## 🚀 Quick Start
        
        1. Download the Pi OS image above
        2. Flash to a 32GB+ microSD card using Balena Etcher
        3. Insert SD card + USB drive into your Pi 4/5
        4. Power on and connect to the PocketCloud WiFi network
        5. Open http://192.168.4.1 in your browser
        
        ## 📋 Verification
        
        Verify downloads with SHA256 checksums in `SHA256SUMS.txt`
        EOF
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: PocketCloud Drive ${{ steps.version.outputs.version }}
        body_path: release_notes.md
        files: release-assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update install script URL
      run: |
        # Update the install script to point to the latest release
        echo "Latest release: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Pi Image: $(ls release-assets/PocketCloud-*.img.xz)" >> $GITHUB_STEP_SUMMARY
        echo "Desktop clients: $(ls release-assets/PocketCloud-*-{mac,win,linux}-*)" >> $GITHUB_STEP_SUMMARY